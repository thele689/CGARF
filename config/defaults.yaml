project:
  name: cgarf
  version: 0.1.0

model:
  provider: "openai"   # openai, anthropic, azure, local

  debate_model: "gpt-4.1"
  judging_model: "gpt-4.1"
  summarization_model: "gpt-4.1"
  generation_model: "gpt-4.1"
  embedding_model: "qwen3-embedding-0.6b"

  max_tokens: 4096
  
cgarf:
  cg_mad:
    eta1: 0.2
    eta2: 0.4
    eta3: 0.4

    max_rounds: 5
    early_stop_consecutive_wins: 3

    length_penalty_lambda: 0.1

  srcd:
    total_sampling_budget: 30   # total budget across candidate locations
    reflection_threshold: 0.6

    reflection_weights:
      semantic: 0.2
      causal: 0.4
      minimal: 0.2

    consistency_alpha: 0.8
    penalty_beta: 0.5
    top_k_patches: 5

    # optional implementation defaults; may be overridden by reflection
    default_generation_temperature: 0.7

  tspf:
    mu: 0.7
    test_timeout: 120
    enable_regression_test: true
    enable_reproduction_test: true

  debug_mode: false

experiment:
  dataset: "swe-bench-lite"
  subset_size: null
  num_runs: 10
  seed_base: 42

  metrics:
    - "resolved_percent"
    - "apply_percent"
    - "top_1"
    - "map"
    - "mrr"

  statistical_significance:
    paired_bootstrap:
      enabled: true
      samples: 10000
      confidence_level: 0.95
    mcnemar:
      enabled: true
    multiple_comparison:
      method: "holm-bonferroni"
      alpha: 0.05

logging:
  level: "INFO"
  file: "logs/cgarf.log"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {message}"

paths:
  root_dir: "./"
  results_dir: "results/"
  logs_dir: "logs/"
  cache_dir: ".cache/"
  test_temp_dir: ".test_tmp/"
